services:
  - type: web
    name: wws-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: weather-backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: PORT
        value: 3001
      # CORS_ORIGIN: comma-separated list (set after Vercel deploy gives you the URL)
      - key: CORS_ORIGIN
        value: http://localhost:5173
      - key: AUTH_TOKEN
        generateValue: true
      - key: DEMO_EMAIL
        value: operator@wws.gov
      - key: DEMO_PASSWORD
        value: Wws123!
      - key: AUTH_DISABLED
        value: "false"
